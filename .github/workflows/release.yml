name: Release

on:
  push:
    tags:
      - "v[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --locked

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: false
            install_musl: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.install_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip and rename binary
        run: |
          src="target/${{ matrix.target }}/release/amf"
          dst="amf-${{ matrix.target }}"
          strip "$src" 2>/dev/null || true
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amf-${{ matrix.target }}
          path: amf-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: find artifacts -type f -exec mv {} artifacts/ \; && find artifacts -type d -empty -delete

      - name: Validate changelog for major/minor releases
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' \
            | sed -n '2p')

          CURRENT="${CURRENT_TAG#v}"
          IFS=. read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "$CURRENT"

          require_changelog=0
          if [ -z "$PREV_TAG" ]; then
            require_changelog=1
          else
            PREV="${PREV_TAG#v}"
            IFS=. read -r PREV_MAJOR PREV_MINOR PREV_PATCH <<< "$PREV"
            if [ "$CUR_MAJOR" -gt "$PREV_MAJOR" ]; then
              require_changelog=1
            elif [ "$CUR_MAJOR" -eq "$PREV_MAJOR" ] && \
              [ "$CUR_MINOR" -gt "$PREV_MINOR" ]; then
              require_changelog=1
            fi
          fi

          if [ "$require_changelog" -eq 1 ]; then
            grep -Eq "^## \[$CURRENT_TAG\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
          fi

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' \
            | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            BODY=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" \
              --no-merges)
          else
            BODY=$(git log --pretty=format:"- %s" --no-merges)
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/*
